name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make

      - name: Build program
        run: make

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fib-binary
          path: fib
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: fib-binary
          path: .

      - name: Make binary executable
        run: chmod +x fib

      - name: Install dependencies (for tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make

      - name: Run tests
        run: |
          chmod +x run_test.sh
          ./run_test.sh

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: fib-binary
          path: .

      - name: Make binary executable
        run: chmod +x fib

      - name: Create deb package structure
        run: |
          mkdir -p deb-package/usr/bin
          cp fib deb-package/usr/bin/
          mkdir -p deb-package/DEBIAN
          echo "Package: fib" > deb-package/DEBIAN/control
          echo "Version: 1.0" >> deb-package/DEBIAN/control
          echo "Section: utils" >> deb-package/DEBIAN/control
          echo "Priority: optional" >> deb-package/DEBIAN/control
          echo "Architecture: amd64" >> deb-package/DEBIAN/control
          echo "Maintainer: Your Name <your.email@example.com>" >> deb-package/DEBIAN/control
          echo "Description: Fibonacci number calculator" >> deb-package/DEBIAN/control
          echo " This program computes the n-th Fibonacci number." >> deb-package/DEBIAN/control

      - name: Build deb package
        run: dpkg-deb --build deb-package fib_1.0_amd64.deb

      - name: Upload deb package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fib-deb-package
          path: fib_1.0_amd64.deb
          retention-days: 7
